<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvitationCraft — Generator Undangan Premium</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg0:#090909;--bg1:#101010;--bg2:#161616;--bg3:#1c1c1c;--bd:#242424;--bdh:#333;--t1:#ede6da;--t2:#a89e90;--t3:#665e52;--acc:#C9A96E;--acch:#d9bb82;--accbg:rgba(201,169,110,.07);--err:#b84545;--ok:#4a9a5a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--t1)}
body{font-family:'Outfit',sans-serif}

/* Layout */
.app-container{display:flex;height:100vh}
.sidebar{width:400px;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.main-preview{flex:1;background:var(--bg0);display:flex;flex-direction:column;position:relative}

/* Sidebar Header */
.side-head{padding:24px;border-bottom:1px solid var(--bd)}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--acc);display:flex;align-items:center;gap:10px}

/* Form Styling */
.form-scroll{flex:1;overflow-y:auto;padding:24px}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin:24px 0 12px;font-weight:700}
.section-title:first-child{margin-top:0}
.input-group{margin-bottom:16px}
.label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px}
input,textarea{width:100%;background:var(--bg2);border:1px solid var(--bd);padding:12px;border-radius:8px;color:var(--t1);font-family:inherit;transition:all 0.2s}
input:focus,textarea:focus{outline:none;border-color:var(--acc);background:var(--bg3)}

/* Action Buttons */
.actions{padding:24px;background:var(--bg1);border-top:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:12px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
.btn-primary{background:var(--acc);color:var(--bg0)}
.btn-primary:hover{background:var(--acch)}
.btn-outline{background:transparent;border:1px solid var(--bd);color:var(--t1)}
.btn-outline:hover{border-color:var(--t2);background:var(--bg2)}

/* Preview Frame */
.preview-header{height:56px;background:var(--bg1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.frame-wrapper{flex:1;padding:40px;display:flex;justify-content:center;overflow-y:auto}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg3);border:1px solid var(--bd);padding:12px 24px;border-radius:100px;color:var(--t1);font-size:14px;display:flex;align-items:center;gap:10px;transition:all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);z-index:1000;opacity:0}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="side-head">
            <div class="logo"><i class="fas fa-feather-pointed"></i> InvitationCraft</div>
        </div>
        
        <div class="form-scroll" id="formInputs">
            <div class="section-title">Informasi Pasangan</div>
            <div class="input-group">
                <span class="label">Nama Mempelai Pria</span>
                <input type="text" id="groomName" value="Aditya Pratama">
            </div>
            <div class="input-group">
                <span class="label">Nama Mempelai Wanita</span>
                <input type="text" id="brideName" value="Saraswati Putri">
            </div>

            <div class="section-title">Waktu & Lokasi</div>
            <div class="input-group">
                <span class="label">Tanggal Akad/Resepsi</span>
                <input type="text" id="weddingDate" value="Minggu, 20 Oktober 2024">
            </div>
            <div class="input-group">
                <span class="label">Jam Acara</span>
                <input type="text" id="weddingTime" value="09:00 - Selesai">
            </div>
            <div class="input-group">
                <span class="label">Lokasi / Alamat</span>
                <textarea id="weddingLocation" rows="3">Grand Ballroom Hotel Mulia, Jakarta Pusat</textarea>
            </div>

            <div class="section-title">Kustomisasi</div>
            <div class="input-group">
                <span class="label">Warna Tema</span>
                <input type="color" id="primaryColor" value="#C9A96E" style="height:45px; padding:2px">
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-outline" id="btnCopy"><i class="far fa-copy"></i> Salin HTML</button>
            <button class="btn btn-primary" id="btnDownload"><i class="fas fa-download"></i> Unduh File</button>
        </div>
    </div>

    <!-- Main Preview -->
    <div class="main-preview">
        <div class="preview-header">
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Live Mobile Preview</div>
            <div class="flex gap-4">
                <i class="fas fa-mobile-alt text-acc"></i>
            </div>
        </div>
        <div class="frame-wrapper">
            <iframe id="preview-frame" style="width:375px; height:667px; border:none; border-radius:12px; background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.4)"></iframe>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
/**
 * Logika Aplikasi Terintegrasi
 */
document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('input, textarea');
    const btnCopy = document.getElementById('btnCopy');
    const btnDownload = document.getElementById('btnDownload');
    const frame = document.getElementById('preview-frame');

    // Inisialisasi Preview
    updatePreview();

    // Sambungkan setiap input ke fungsi update
    inputs.forEach(input => {
        input.addEventListener('input', updatePreview);
    });

    // Event Listeners untuk tombol aksi
    btnCopy.addEventListener('click', copyHTML);
    btnDownload.addEventListener('click', downloadHTML);

    /**
     * Mengumpulkan data dari form secara aman
     */
    function gatherFormData() {
        return {
            groom: document.getElementById('groomName')?.value || 'Mempelai Pria',
            bride: document.getElementById('brideName')?.value || 'Mempelai Wanita',
            date: document.getElementById('weddingDate')?.value || '-',
            time: document.getElementById('weddingTime')?.value || '-',
            location: document.getElementById('weddingLocation')?.value || '-',
            color: document.getElementById('primaryColor')?.value || '#C9A96E'
        };
    }

    /**
     * Menghasilkan kode HTML lengkap untuk undangan
     */
    function generateHTML() {
        const d = gatherFormData();
        return `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; color: #333; background: #fff; text-align: center; }
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fdfbf7; padding: 20px; box-sizing: border-box; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: ${d.color}; margin: 10px 0; font-weight: 700; }
        .date-badge { border-top: 1px solid ${d.color}; border-bottom: 1px solid ${d.color}; padding: 10px 20px; margin: 20px 0; text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; }
        .content { padding: 60px 25px; }
        .names { font-family: 'Playfair Display', serif; font-size: 1.8rem; line-height: 1.2; margin: 30px 0; }
        .ampersand { font-style: italic; color: ${d.color}; font-size: 2.5rem; display: block; margin: 10px 0; }
        .info-card { background: #fafafa; border-radius: 8px; padding: 30px; margin-top: 30px; border: 1px solid #eee; }
        .footer { padding: 40px; font-size: 0.7rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="hero">
        <p style="text-transform:uppercase; letter-spacing:2px; font-size:0.6rem; margin-bottom:0;">Undangan Pernikahan</p>
        <h1>${d.groom} & ${d.bride}</h1>
        <div class="date-badge">${d.date}</div>
    </div>
    <div class="content">
        <p style="font-style:italic; font-size:0.9rem">Bismillahirrahmannirraheem</p>
        <p>Dengan memohon rahmat dan ridho Allah SWT, kami mengundang Anda ke acara kami:</p>
        <div class="names">
            ${d.groom}
            <span class="ampersand">&</span>
            ${d.bride}
        </div>
        <div class="info-card">
            <p><strong><i class="far fa-clock"></i> Waktu</strong><br>${d.time}</p>
            <p style="margin-top:20px"><strong><i class="fas fa-map-marker-alt"></i> Lokasi</strong><br>${d.location}</p>
        </div>
    </div>
    <div class="footer">Dibuat secara eksklusif dengan InvitationCraft</div>
</body>
</html>`;
    }

    /**
     * Memperbarui konten Iframe
     */
    function updatePreview() {
        if (!frame) return;
        const html = generateHTML();
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open();
        doc.write(html);
        doc.close();
    }

    /**
     * Fungsi Salin HTML
     */
    function copyHTML() {
        const html = generateHTML();
        const el = document.createElement('textarea');
        el.value = html;
        document.body.appendChild(el);
        el.select();
        try {
            document.execCommand('copy');
            showToast('Kode HTML berhasil disalin!');
        } catch (err) {
            console.error('Gagal menyalin', err);
        }
        document.body.removeChild(el);
    }

    /**
     * Fungsi Unduh File
     */
    function downloadHTML() {
        const d = gatherFormData();
        const html = generateHTML();
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const safeName = (d.groom + '-' + d.bride).toLowerCase().replace(/\s+/g, '-');
        
        a.href = url;
        a.download = `undangan-${safeName}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('File siap di perangkat Anda!');
    }

    /**
     * Feedback UI
     */
    function showToast(msg) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.innerHTML = `<i class="fas fa-check-circle" style="color:var(--acc)"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
});
</script>
</body>
</html>
